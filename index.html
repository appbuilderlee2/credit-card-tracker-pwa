<!doctype html>
<html class="dark" lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>信用卡到期提醒 Dashboard</title>

    <!-- PWA -->
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./public/icon-192.png" />
    <link rel="apple-touch-icon" href="./public/icon-192.png" />

    <!-- Tailwind (CDN MVP) -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#135bec",
              accent: "#60a5fa",
              neutral: "#1e293b",
              "base-200": "#1e293b",
              success: "#22c55e",
              warning: "#f59e0b",
              error: "#ef4444",
              "background-light": "#f6f6f8",
              "background-dark": "#0f172a",
            },
            fontFamily: {
              display: ["Inter", "sans-serif"],
              body: ["Inter", "sans-serif"],
            },
          },
        },
      };
    </script>

    <style>
      body { font-family: Inter, sans-serif; }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
  </head>

  <body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col font-display antialiased">
    <header class="sticky top-0 z-50 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
      <div class="px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-primary to-accent flex items-center justify-center shadow-lg shadow-primary/20 text-white">
            <span class="material-symbols-outlined">credit_card</span>
          </div>
          <div>
            <h1 class="text-lg font-bold leading-tight">G5｜信用卡 Dashboard</h1>
            <p class="text-xs text-slate-500 dark:text-slate-400 font-medium" id="subTitle">載入中…</p>
          </div>
        </div>

        <button id="refreshBtn" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors text-slate-600 dark:text-slate-300" title="Refresh">
          <span class="material-symbols-outlined">refresh</span>
        </button>
      </div>
    </header>

    <main class="flex-1 px-4 py-6 pb-24 space-y-8 overflow-y-auto no-scrollbar">
      <!-- KPI -->
      <section class="grid grid-cols-2 gap-4" id="kpi">
        <div class="bg-white dark:bg-base-200 p-4 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700/50 flex flex-col gap-1">
          <p class="text-sm text-slate-500 dark:text-slate-400 font-medium">今日應提醒</p>
          <div class="flex items-baseline gap-2">
            <span class="text-2xl font-bold" id="kpiToday">—</span>
            <span class="text-xs text-slate-400">張</span>
          </div>
          <p class="text-xs text-slate-500 dark:text-slate-400" id="kpiTodayHint">（<=10日且未繳）</p>
        </div>

        <div class="bg-white dark:bg-base-200 p-4 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700/50 flex flex-col gap-1">
          <p class="text-sm text-slate-500 dark:text-slate-400 font-medium">最急（1–3日）</p>
          <div class="flex items-baseline gap-2">
            <span class="text-2xl font-bold" id="kpiUrgent">—</span>
            <span class="text-xs text-slate-400">張</span>
          </div>
          <p class="text-xs text-slate-500 dark:text-slate-400">未繳</p>
        </div>
      </section>

      <!-- Action Needed (computed) -->
      <section>
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-lg font-bold">Action Needed</h2>
          <a class="text-primary text-sm font-semibold hover:text-blue-400 transition-colors" target="_blank" rel="noreferrer" id="sheetLink" href="#">Open Sheet</a>
        </div>

        <div class="space-y-4" id="actionList">
          <div class="text-sm text-slate-500 dark:text-slate-400">載入中…</div>
        </div>
      </section>

      <!-- All unpaid -->
      <section>
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-lg font-bold">未繳（最急排頭）</h2>
        </div>

        <div class="bg-white dark:bg-base-200 rounded-2xl p-3 border border-slate-100 dark:border-slate-700/50 overflow-x-auto">
          <table class="w-full text-sm" id="unpaidTable">
            <thead class="text-left text-slate-500 dark:text-slate-400">
              <tr>
                <th class="py-2 pr-3">Card</th>
                <th class="py-2 pr-3">Due</th>
                <th class="py-2 pr-3">Days</th>
                <th class="py-2 pr-3">Amount</th>
                <th class="py-2 pr-3">Phase</th>
              </tr>
            </thead>
            <tbody class="text-slate-900 dark:text-slate-100"></tbody>
          </table>
        </div>
      </section>

      <section class="text-xs text-slate-500 dark:text-slate-400">
        <p>提示：GitHub Pages 版如果要讀 Google Sheet，需先 Publish to web（或改用 backend proxy）。</p>
      </section>
    </main>

    <nav class="fixed bottom-0 left-0 w-full z-50 bg-white/90 dark:bg-base-200/95 backdrop-blur-lg border-t border-slate-200 dark:border-slate-800 pb-safe">
      <div class="flex justify-around items-center h-16 px-2">
        <a class="flex flex-col items-center justify-center gap-1 w-full h-full text-primary" href="#">
          <span class="material-symbols-outlined text-[24px]">home</span>
          <span class="text-[10px] font-medium">Home</span>
        </a>
        <a class="flex flex-col items-center justify-center gap-1 w-full h-full text-slate-400" href="./about.html">
          <span class="material-symbols-outlined text-[24px]">info</span>
          <span class="text-[10px] font-medium">About</span>
        </a>
      </div>
      <div class="h-[env(safe-area-inset-bottom)]"></div>
    </nav>

    <style>
      .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>

    <script type="module" src="./src/app.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js"));
      }
    </script>
  </body>
</html>
